<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMaster Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 md:p-12 text-slate-900">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter">STOCK MASTER</h1>
                <p class="text-slate-500 font-medium">Control de Inventario Inteligente</p>
            </div>
            <input type="text" id="buscador" placeholder="Buscar producto..." 
                class="w-full md:w-80 p-4 rounded-2xl border-none shadow-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </header>

        <div id="grid-productos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>
    <script type="module" src="/main.js"></script>
</body>
</html>
